_format_version: "3.0"
_transform: true

services:
  # 1. Auth Service
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false
        preserve_host: true
        protocols: [http, https]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With", "Origin", "Cache-Control", "X-File-Name", "X-Forwarded-Proto", "Accept-Encoding", "Access-Control-Request-Method", "Access-Control-Request-Headers"]
          credentials: true
          max_age: 3600

  # 2. Organization Service
  - name: organization-service
    url: http://organization-service:8081
    routes:
      - name: organization-routes
        paths:
          - /api/organizations
          - /api/clinics
          - /api/doctors
          - /api/departments
          - /api/doctor-leaves
          - /api/doctor-time-slots
          - /api/doctor-session-slots
          - /api/clinic-doctor-links
          - /api/doctor-schedules
          - /api/doctor-consultation-fees
          - /api/services
          - /api/links
          - /api/patient-clinics
          - /api/clinic-patients
          - /api/clinic-specific-patients
          - /api/patients
          - /api/admin
        strip_path: false
        preserve_host: true
        protocols: [http, https]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With", "Origin", "Cache-Control", "X-File-Name", "X-Forwarded-Proto", "Accept-Encoding", "Access-Control-Request-Method", "Access-Control-Request-Headers"]
          credentials: true
          max_age: 3600

  # 3. Appointment Service
  - name: appointment-service
    url: http://appointment-service:8082
    routes:
      - name: appointment-routes
        paths:
          - /api/v1
        strip_path: false
        preserve_host: true
        protocols: [http, https]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With", "Origin", "Cache-Control", "X-File-Name", "X-Forwarded-Proto", "Accept-Encoding", "Access-Control-Request-Method", "Access-Control-Request-Headers"]
          credentials: true
          max_age: 3600

  # 4. Uploads
  - name: uploads-service
    url: http://organization-service:8081
    routes:
      - name: uploads-route
        paths:
          - /uploads
        strip_path: false
        preserve_host: true
        protocols: [http, https]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With", "Origin", "Cache-Control", "X-File-Name", "X-Forwarded-Proto", "Accept-Encoding", "Access-Control-Request-Method", "Access-Control-Request-Headers"]
          credentials: true
          max_age: 3600

  # 5. Global Health Check (Mapped to Auth Service Health)
  - name: global-health-service
    url: http://auth-service:8080/api/auth/health
    routes:
      - name: global-health-route
        paths:
          - /health
        strip_path: true
        protocols: [http, https]

  # 6. Gateway Landing Page (Internal)
  - name: gateway-root
    url: http://auth-service:8080
    routes:
      - name: root-landing
        paths:
          - /
        strip_path: false
        protocols: [http, https]
    plugins:
      - name: request-termination
        config:
          status_code: 200
          body: '{"message": "DoctorAndMe API Gateway Operational"}'
          content_type: application/json

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      echo_downstream: true
