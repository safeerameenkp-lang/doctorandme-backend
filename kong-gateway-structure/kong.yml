_format_version: "3.0"
_transform: true

services:
  # ---------------------------------------------------------
  # 1. Auth Service (Authentication & User Management)
  # ---------------------------------------------------------
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false
        preserve_host: true
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With"]
          exposed_headers: ["X-Auth-Token"]
          credentials: true

  # ---------------------------------------------------------
  # 2. Organization Service (Clinic & Staff Management)
  # ---------------------------------------------------------
  - name: organization-service
    url: http://organization-service:8081
    routes:
      - name: organization-routes
        paths:
          - /api/organizations
        strip_path: false
        preserve_host: true
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]

  # ---------------------------------------------------------
  # 3. Appointment Service (Slots & Bookings)
  # ---------------------------------------------------------
  - name: appointment-service
    url: http://appointment-service:8082
    routes:
      - name: appointment-routes
        paths:
          - /api/v1
        strip_path: false
        preserve_host: true
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]

  # ---------------------------------------------------------
  # 4. Uploads (File Storage Proxy)
  # ---------------------------------------------------------
  - name: uploads-service
    url: http://organization-service:8081
    routes:
      - name: uploads-route
        paths:
          - /uploads
        strip_path: false
        preserve_host: true

  # ---------------------------------------------------------
  # 5. System Routes (Health & Landing)
  # ---------------------------------------------------------
  - name: system-meta
    url: http://auth-service:8080/api/auth # Base for meta-checks
    routes:
      - name: global-health
        paths:
          - /health
        strip_path: true
      - name: root-landing
        paths:
          - /
        strip_path: false
    plugins:
      # This terminates the request at the root (/) safely
      - name: request-termination
        config:
          status_code: 200
          message: "DoctorAndMe API Gateway v1.0 - Systems Operational"
          content_type: application/json

# ---------------------------------------------------------
# Global Plugins (Observability)
# ---------------------------------------------------------
plugins:
  - name: request-id
    config:
      header_name: X-Request-ID
      echo_downstream: true
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      echo_downstream: true
