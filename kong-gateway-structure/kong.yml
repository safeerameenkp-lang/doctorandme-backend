_format_version: "3.0"
_transform: true

services:
  # 1. Auth Service
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false
        preserve_host: true
        protocols: [http, https]

  # 2. Organization Service
  - name: organization-service
    url: http://organization-service:8081
    routes:
      - name: organization-routes
        paths:
          - /api/organizations
        strip_path: false
        preserve_host: true
        protocols: [http, https]

  # 3. Appointment Service
  - name: appointment-service
    url: http://appointment-service:8082
    routes:
      - name: appointment-routes
        paths:
          - /api/v1
        strip_path: false
        preserve_host: true
        protocols: [http, https]

  # 4. Uploads
  - name: uploads-service
    url: http://organization-service:8081
    routes:
      - name: uploads-route
        paths:
          - /uploads
        strip_path: false
        preserve_host: true
        protocols: [http, https]

  # 5. Global Health Check (Mapped to Auth Service Health)
  - name: global-health-service
    url: http://auth-service:8080/api/auth/health
    routes:
      - name: global-health-route
        paths:
          - /health
        strip_path: true
        protocols: [http, https]

  # 6. Gateway Landing Page (Internal)
  - name: gateway-root
    url: http://auth-service:8080
    routes:
      - name: root-landing
        paths:
          - /
        strip_path: false
        protocols: [http, https]
    plugins:
      - name: request-termination
        config:
          status_code: 200
          body: '{"message": "DoctorAndMe API Gateway Operational"}'
          content_type: application/json

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      echo_downstream: true
