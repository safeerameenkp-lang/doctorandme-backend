version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: drandme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - org_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Note: In production, you should run auth-service migrations first
  # as organization-service depends on users table from auth-service
  organization-migrations:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: postgres123
    volumes:
      - ./migrations:/migrations:ro
    command: >
      sh -c "
        until pg_isready -h postgres -p 5432 -U postgres; do
          echo 'Waiting for postgres...'
          sleep 1
        done
        for f in /migrations/*.sql; do
          echo \"Running migration: $$(basename $$f)\"
          psql -h postgres -p 5432 -U postgres -d drandme -f $$f
        done
        echo 'Organization service migrations completed!'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - org_network

  organization-service:
    build: .
    expose:
      - "8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: drandme
      JWT_ACCESS_SECRET: your-access-secret-key-here
      JWT_REFRESH_SECRET: your-refresh-secret-key-here
      PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      organization-migrations:
        condition: service_completed_successfully
    networks:
      - org_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  org_network:
    driver: bridge

