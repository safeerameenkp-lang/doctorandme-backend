_format_version: "2.1"
_transform: true

services:
  # ----------------------
  # Auth Service
  # Gateway: /auth or /api/auth -> Backend: /api/auth
  # ----------------------
  - name: auth-service
    url: http://auth-service:8080/api
    routes:
      - name: auth-root
        paths: ["/"]
        strip_path: false
      - name: auth-route
        paths: ["/auth", "/api/auth"]
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With"]
          exposed_headers: ["X-Auth-Token"]
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  # ----------------------
  # Organization Service (Consolidated)
  # Gateway: /api, /organization, or /uploads -> Backend: /api, /organization, or /uploads
  # ----------------------
  - name: organization-service
    url: http://organization-service:8081
    routes:
      - name: organization-route
        paths: ["/api", "/organization", "/uploads"]
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With"]
          exposed_headers: ["X-Auth-Token"]
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  # ----------------------
  # Appointment Service
  # Gateway: /appointment or /api/v1 -> Backend: /api/v1
  # ----------------------
  - name: appointment-service
    url: http://appointment-service:8082/api
    routes:
      - name: appointment-route
        paths: ["/appointment", "/v1", "/api/v1"]
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Accept-Language", "Content-Language", "Content-Type", "Authorization", "X-Requested-With"]
          exposed_headers: ["X-Auth-Token"]
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local
