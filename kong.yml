_format_version: "3.0"
_transform: true

services:
  # Auth Service
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false
        preserve_host: true
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Accept-Language
            - Content-Language
            - Content-Type
            - Authorization
            - X-Requested-With
            - Origin
            - Cache-Control
            - X-File-Name
            - X-Forwarded-Proto
            - Accept-Encoding
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  # Appointment Service
  - name: appointment-service
    url: http://appointment-service:8082
    routes:
      - name: appointment-routes
        paths:
          - /api/v1
        strip_path: false
        preserve_host: true
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Accept-Language
            - Content-Language
            - Content-Type
            - Authorization
            - X-Requested-With
            - Origin
            - Cache-Control
            - X-File-Name
            - X-Forwarded-Proto
            - Accept-Encoding
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  # Organization Service
  - name: organization-service
    url: http://organization-service:8081
    routes:
      - name: organization-routes
        paths:
          - /api/organizations
          - /api/clinics
          - /api/doctors
          - /api/departments
          - /api/doctor-leaves
          - /api/doctor-time-slots
          - /api/doctor-session-slots
          - /api/clinic-doctor-links
          - /api/doctor-schedules
          - /api/doctor-consultation-fees
          - /api/services
          - /api/links
          - /api/patient-clinics
          - /api/clinic-patients
          - /api/clinic-specific-patients
          - /api/patients
          - /api/admin
        strip_path: false
        preserve_host: true
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Accept-Language
            - Content-Language
            - Content-Type
            - Authorization
            - X-Requested-With
            - Origin
            - Cache-Control
            - X-File-Name
            - X-Forwarded-Proto
            - Accept-Encoding
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  # Uploads Service (Proxying to Organization Service)
  - name: uploads-service
    url: http://organization-service:8081
    routes:
      - name: uploads-route
        paths:
          - /uploads
        strip_path: false
        preserve_host: true
        protocols:
          - http
          - https
        methods:
          - GET
          - OPTIONS
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - OPTIONS
          headers:
            - Accept
            - Accept-Language
            - Content-Language
            - Content-Type
            - Authorization
            - X-Requested-With
            - Origin
            - Cache-Control
            - X-File-Name
            - X-Forwarded-Proto
            - Accept-Encoding
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
