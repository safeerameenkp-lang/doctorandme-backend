services:

  # ----------------------
  # Migration services
  # ----------------------
  auth-migrations:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_SSLROOTCERT: /certs/rds-global-bundle.pem
      DB_SSL_CERT: /certs/rds-global-bundle.pem
    volumes:
      - ./services/auth-service/migrations:/migrations:ro
      - ./certs/rds-global-bundle.pem:/certs/rds-global-bundle.pem:ro
    entrypoint: [ "sh", "-c" ]
    command: |
      echo 'Waiting for database...';
      until pg_isready -h $$DB_HOST -p $$DB_PORT -U $$DB_USER; do
        echo 'Postgres not ready, sleeping 2s...';
        sleep 2;
      done;
      echo 'Database ready, running migrations...';
      export PGPASSWORD="$$DB_PASSWORD"
      for f in /migrations/*.sql; do
        if [ -f "$$f" ]; then
          echo "Running $$f";
          psql "host=$$DB_HOST port=$$DB_PORT user=$$DB_USER dbname=$$DB_NAME sslmode=$$DB_SSLMODE sslrootcert=$$DB_SSLROOTCERT" -f "$$f";
        fi;
      done;
      echo 'Migrations done';
    networks:
      - clinic_network

  organization-migrations:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_SSLROOTCERT: /certs/rds-global-bundle.pem
      DB_SSL_CERT: /certs/rds-global-bundle.pem
    volumes:
      - ./services/organization-service/migrations:/migrations:ro
      - ./certs/rds-global-bundle.pem:/certs/rds-global-bundle.pem:ro
    entrypoint: [ "sh", "-c" ]
    command: |
      echo 'Waiting for database...';
      until pg_isready -h $$DB_HOST -p $$DB_PORT -U $$DB_USER; do
        echo 'Postgres not ready, sleeping 2s...';
        sleep 2;
      done;
      echo 'Database ready, running migrations...';
      export PGPASSWORD="$$DB_PASSWORD"
      for f in /migrations/*.sql; do
        if [ -f "$$f" ]; then
          echo "Running $$f";
          psql "host=$$DB_HOST port=$$DB_PORT user=$$DB_USER dbname=$$DB_NAME sslmode=$$DB_SSLMODE sslrootcert=$$DB_SSLROOTCERT" -f "$$f";
        fi;
      done;
      echo 'Migrations done';
    networks:
      - clinic_network

  appointment-migrations:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_SSLROOTCERT: /certs/rds-global-bundle.pem
      DB_SSL_CERT: /certs/rds-global-bundle.pem
    volumes:
      - ./services/appointment-service/migrations:/migrations:ro
      - ./certs/rds-global-bundle.pem:/certs/rds-global-bundle.pem:ro
    entrypoint: [ "sh", "-c" ]
    command: |
      echo 'Waiting for database...';
      until pg_isready -h $$DB_HOST -p $$DB_PORT -U $$DB_USER; do
        echo 'Postgres not ready, sleeping 2s...';
        sleep 2;
      done;
      echo 'Database ready, running migrations...';
      export PGPASSWORD="$$DB_PASSWORD"
      for f in /migrations/*.sql; do
        if [ -f "$$f" ]; then
          echo "Running $$f";
          psql "host=$$DB_HOST port=$$DB_PORT user=$$DB_USER dbname=$$DB_NAME sslmode=$$DB_SSLMODE sslrootcert=$$DB_SSLROOTCERT" -f "$$f";
        fi;
      done;
      echo 'Migrations done';
    networks:
      - clinic_network

  # ----------------------
  # Services
  # ----------------------
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_SSLROOTCERT: /certs/rds-global-bundle.pem
      DB_SSL_CERT: /certs/rds-global-bundle.pem
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-access-secret-key-here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-here}
      PORT: 8080
    volumes:
      - ./certs/rds-global-bundle.pem:/certs/rds-global-bundle.pem:ro
    depends_on:
      auth-migrations:
        condition: service_completed_successfully
      organization-migrations:
        condition: service_completed_successfully
      appointment-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - clinic_network

  organization-service:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_SSLROOTCERT: /certs/rds-global-bundle.pem
      DB_SSL_CERT: /certs/rds-global-bundle.pem
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-access-secret-key-here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-here}
      PORT: 8081
    volumes:
      - ./services/organization-service/uploads:/root/uploads
      - ./certs/rds-global-bundle.pem:/certs/rds-global-bundle.pem:ro
    depends_on:
      auth-migrations:
        condition: service_completed_successfully
      organization-migrations:
        condition: service_completed_successfully
      appointment-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - clinic_network

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_SSLROOTCERT: /certs/rds-global-bundle.pem
      DB_SSL_CERT: /certs/rds-global-bundle.pem
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-access-secret-key-here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-here}
      PORT: 8082
    volumes:
      - ./certs/rds-global-bundle.pem:/certs/rds-global-bundle.pem:ro
    depends_on:
      auth-migrations:
        condition: service_completed_successfully
      organization-migrations:
        condition: service_completed_successfully
      appointment-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - clinic_network

  # ----------------------
  # Kong API Gateway
  # ----------------------
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS: bundled
      KONG_NGINX_DAEMON: "off"
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      auth-service:
        condition: service_started
      organization-service:
        condition: service_started
      appointment-service:
        condition: service_started
    networks:
      - clinic_network
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "kong health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 3

  # ----------------------
  # PgAdmin
  # ----------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@drandme.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - clinic_network
    restart: unless-stopped

# ----------------------
# Volumes & Networks
# ----------------------
volumes:
  pgadmin_data:


networks:
  clinic_network:
    driver: bridge
