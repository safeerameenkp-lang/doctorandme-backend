# Docker Compose for DoctorAndMe Backend
# Contains Auth, Organization, and Appointment microservices.

services:

  # ----------------------
  # Migration services
  # ----------------------
  auth-migrations:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - .env
    volumes:
      - ./services/auth-service/migrations:/migrations:ro
    entrypoint: [ "sh", "/migrations/run-migrations.sh" ]
    networks:
      - clinic_network

  organization-migrations:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    env_file:
      - .env
    volumes:
      - ./services/organization-service/migrations:/migrations:ro
    entrypoint: [ "sh", "/migrations/run-migrations.sh" ]
    networks:
      - clinic_network
    depends_on:
      auth-migrations:
        condition: service_completed_successfully

  appointment-migrations:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    env_file:
      - .env
    volumes:
      - ./services/appointment-service/migrations:/migrations:ro
    entrypoint: [ "sh", "/migrations/run-migrations.sh" ]
    networks:
      - clinic_network
    depends_on:
      organization-migrations:
        condition: service_completed_successfully

  # ----------------------
  # Services
  # ----------------------
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
    depends_on:
      auth-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      clinic_network:
        aliases:
          - auth-service

  organization-service:
    build:
      context: .
      dockerfile: services/organization-service/Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      PORT: 8081
    volumes:
      - ./services/organization-service/uploads:/root/uploads
    depends_on:
      organization-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      clinic_network:
        aliases:
          - organization-service

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      PORT: 8082
    depends_on:
      appointment-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      clinic_network:
        aliases:
          - appointment-service

  # ----------------------
  # Kong API Gateway Configuration
  # ----------------------
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS: bundled
      KONG_NGINX_DAEMON: "off"
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      auth-service:
        condition: service_started
      organization-service:
        condition: service_started
      appointment-service:
        condition: service_started
    networks:
      - clinic_network
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "kong health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 3

  # ----------------------
  # PgAdmin
  # ----------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@drandme.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - clinic_network
    restart: unless-stopped

# ----------------------
# Volumes & Networks
# ----------------------
volumes:
  pgadmin_data:

networks:
  clinic_network:
    driver: bridge
